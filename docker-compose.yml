services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  test:
    build: .
    environment:
      DJANGO_SECRET_KEY: test-secret-key
      DJANGO_DEBUG: "True"
      RUN_MIGRATIONS_ON_STARTUP: "false"
      CREATE_SUPERUSER_ON_STARTUP: "false"
      DJANGO_ENV: development
      SQLITE_NAME_DEV: /tmp/django-blog-test.sqlite3
      USE_S3_STORAGE: "False"
    volumes:
      - .:/app
    command: ["python", "manage.py", "test"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_LOCAL_DB:-django_blog_local}
      POSTGRES_USER: ${POSTGRES_LOCAL_USER:-django_blog_local}
      POSTGRES_PASSWORD: ${POSTGRES_LOCAL_PASSWORD:?Set POSTGRES_LOCAL_PASSWORD in .env}
    ports:
      - "${POSTGRES_LOCAL_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
