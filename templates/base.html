<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Django Blog{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#05070b",
              muted: "#39465c",
              brand: "#1267d8",
              deep: "#063d8f",
              accent: "#082f6f",
              soft: "#dcecff",
              paper: "#f8fbff",
              line: "#0c295624"
            },
            fontFamily: {
              sans: ["Space Grotesk", "ui-sans-serif", "system-ui", "sans-serif"],
              serif: ["Source Serif 4", "ui-serif", "serif"]
            }
          }
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-dvh bg-[radial-gradient(circle_at_0_0,rgba(18,103,216,0.12),transparent_28%),radial-gradient(circle_at_85%_15%,rgba(8,47,111,0.10),transparent_24%),linear-gradient(#ffffff,#f8fbff_48%,#eef6ff)] font-sans text-ink antialiased before:pointer-events-none before:fixed before:inset-0 before:bg-[linear-gradient(rgba(18,103,216,0.08)_1px,transparent_1px),linear-gradient(90deg,rgba(18,103,216,0.07)_1px,transparent_1px)] before:bg-[length:40px_40px] before:opacity-45 before:[mask-image:linear-gradient(rgba(0,0,0,0.35),transparent_80%)]">
    <a href="#content" class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50 focus:rounded-full focus:bg-accent focus:px-5 focus:py-3 focus:text-sm focus:font-bold focus:text-white focus:outline-none focus:ring-4 focus:ring-brand/30">Skip to content</a>
    <div class="mx-auto w-[min(100%-2rem,1180px)] pb-16 pt-4 sm:w-[min(100%-3rem,1180px)] sm:pb-20">
      <header class="sticky top-4 z-10 mb-8 rounded-[2rem] border border-line bg-white/80 px-5 py-4 shadow-[0_12px_40px_rgba(10,53,116,0.08)] backdrop-blur md:rounded-full">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <a href="{% url 'blog:post_list' %}" class="inline-flex min-h-11 items-center gap-3 font-bold text-ink outline-none transition hover:text-brand focus-visible:rounded-full focus-visible:ring-4 focus-visible:ring-brand/25">
            <span class="h-4 w-4 rounded-full bg-gradient-to-br from-brand to-[#78b7ff] shadow-[0_0_0_6px_rgba(18,103,216,0.12)]" aria-hidden="true"></span>
            Django Blog
          </a>
          <nav aria-label="Primary navigation" class="flex flex-wrap items-center gap-x-5 gap-y-3 text-[0.95rem] font-medium">
            <a href="{% url 'blog:post_list' %}" class="relative inline-flex min-h-11 items-center text-ink transition after:absolute after:-bottom-1 after:left-0 after:h-0.5 after:w-full after:origin-left after:scale-x-0 after:bg-brand after:transition-transform hover:text-brand hover:after:scale-x-100 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-brand/25 focus-visible:after:scale-x-100">Posts</a>
            <a href="/admin/" class="inline-flex min-h-11 items-center rounded-full border border-line bg-white/80 px-5 text-sm font-bold text-accent transition hover:-translate-y-0.5 hover:border-brand/30 hover:text-brand focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-brand/25">Admin</a>
          </nav>
        </div>
      </header>
      <main id="content">
        {% if messages %}
          <div class="mb-8 space-y-3" aria-live="polite">
            {% for message in messages %}
              <div class="rounded-[1.25rem] border border-line bg-white/90 px-5 py-4 text-sm font-bold text-deep shadow-[0_20px_60px_rgba(10,53,116,0.10)] backdrop-blur">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
